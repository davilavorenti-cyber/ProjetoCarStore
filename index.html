<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
</head>
<body>
    <header>
        <h3>Cadastre seu veiculo para vender mais rapido</h3>
    </header>
    <div>
        <div>
            <p>Formulário</p>
        </div>

        <div>
            <h1>Venda fácil seu carro</h1>
            <p>Descreva as caracteristicas dos seu carro e marque os opcionais que ele possui</p>
            <form>
                <div>
                    <label for="title">Titulo do Anuncio <span>*</span></label>
                    <input type="text" name="title" id="title" placeholder="Um titulo para anunciar seu carro">
                </div>

                <div>
                    <label for="preco">Preço <span>*</span></label>
                    <input type="number" name="Preco" id="preco" placeholder="Defina o Preço">
                </div>

                <div>
                    <label for="descricao">Descrição <span>*</span></label>
                    <textarea name="descricao" id="descricao"></textarea>
                </div>

                <div>
                    <label for="marca">Marca <span>*</span></label>
                    <input type="text" name="Marca" id="Marca" placeholder="Coloque a marca de seu veiculo">
                </div>

                 <div>
                    <label for="modelo">Modelo <span>*</span></label>
                    <input type="text" name="Modelo" id="Modelo" placeholder="Defina o modelo de seu veiculo">
                </div>

                <div>
                    <label for="quilometragem">quilometragem <span>*</span></label>
                    <input number="text" name="quilometragem" id="quilometragem" placeholder="Quilometragem do seu carro">
                </div>

                <div>
                    <label for="dataDeCompra">Data de compra <span>*</span></label>
                    <input number="text" name="dataDeCompra" id="dataDeCompra" placeholder="Data que seu veiculo foi comprado">
                </div>
            </form>
        </div>
    </div>
</body>
</html>
