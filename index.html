<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="cabecalho">
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>

```
<div class="form-container">
    <div class="form-header">
        <p>Formulário</p>
    </div>

    <div class="form-body">
        <h1>Venda fácil seu carro</h1>
        <p>Descreva as características do seu carro e marque os opcionais que ele possui</p>

        <form onsubmit="salvarCarros(event)">
            
            <div class="caixaInputs">
                <label for="title">Título do Anúncio <span class="campo-obrigatorio">*</span></label>
                <input type="text" name="title" id="title" class="block" placeholder="Um título para anunciar seu carro" required>
            </div>

            <div class="caixaInputs">
                <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                <input type="number" name="preco" id="preco" class="block" placeholder="Defina o preço" required>
            </div>

            <div class="caixaInputs">
                <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label>
                <textarea name="descricao" id="descricao" class="block" required></textarea>
            </div>

            <div class="caixaInputs">
                <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                <input type="text" name="marca" id="marca" class="block" placeholder="Marca do veículo" required>
            </div>

            <div class="caixaInputs">
                <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                <input type="text" name="modelo" id="modelo" class="block" placeholder="Modelo do veículo" required>
            </div>

            <div class="caixaInputs">
                <label for="quilometragem">Quilometragem <span class="campo-obrigatorio">*</span></label>
                <input type="number" name="quilometragem" id="quilometragem" class="block" placeholder="Quilometragem do carro" required>
            </div>

            <div class="caixaInputs">
                <label for="dataDeCompra">Data de compra <span class="campo-obrigatorio">*</span></label>
                <input type="date" name="dataDeCompra" id="dataDeCompra" class="block" required>
            </div>

            <fieldset class="caixaInputs">
                <legend>Tipo de Câmbio <span class="campo-obrigatorio">*</span></legend>

                <input type="radio" name="marcha" id="manual" value="manual" required>
                <label for="manual">Manual</label>

                <input type="radio" name="marcha" id="auto" value="automatico">
                <label for="auto">Automático</label>
            </fieldset>

            <div class="caixaInputs">
                <p>Opcionais</p>
                <ul>
                    <li>
                        <input type="checkbox" name="opcionais" id="airbag" value="airbag">
                        <label for="airbag">Airbag</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcionais" id="alarme" value="alarme">
                        <label for="alarme">Alarme</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcionais" id="arCondicionado" value="arCondicionado">
                        <label for="arCondicionado">Ar condicionado</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcionais" id="cameraRe" value="cameraRe">
                        <label for="cameraRe">Câmera de ré</label>
                    </li>
                </ul>
            </div>

            <div class="caixaInputs">
                <ul>
                    <li>
                        <input type="checkbox" name="opcionais" id="assistentePista" value="assistentePista">
                        <label for="assistentePista">Assistente de pista</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcionais" id="partidaSemChave" value="partidaSemChave">
                        <label for="partidaSemChave">Partida sem chave</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcionais" id="integracaoCelular" value="integracaoCelular">
                        <label for="integracaoCelular">Integração com celular</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcionais" id="bancoCouro" value="bancoCouro">
                        <label for="bancoCouro">Banco de couro</label>
                    </li>
                </ul>
            </div>

            <div class="caixaInputs">
                <label for="imagem">Fotos do carro <span class="campo-obrigatorio">*</span></label>
                <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpeg" required>
            </div>

            <input type="submit" value="Enviar" class="btn-submit">

        </form>

        <hr>

        <h2>Carros Cadastrados</h2>
        <div id="listarCarros"></div>

    </div>
</div>

<script src="script/script.js"></script>
```

</body>
</html>
